kind = "web"
previewPath = "/"
title = "אלוגברה"
version = "1.0.0"
id = "artifacts/alogbra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23844

[services.development]
run = "pnpm --filter @workspace/alogbra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alogbra", "run", "build" ]
publicDir = "artifacts/alogbra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23844"
BASE_PATH = "/"
